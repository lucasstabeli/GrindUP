<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#080809" />
    <meta name="background-color" content="#080809" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GrindUP" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120.png" />
    <!-- iOS Splash screens -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Android / general -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- SEO / Social -->
    <meta name="description" content="GrindUP — Construa hábitos, ganhe moedas, sobe no ranking." />
    <meta property="og:title" content="GrindUP" />
    <meta property="og:description" content="Construa hábitos, ganhe moedas, sobe no ranking." />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <title>GrindUP</title>
  </head>
  <body style="background:#080809;color:#eee;font-family:Inter,system-ui,sans-serif;margin:0">
    <div id="root">
      <!-- Fallback shown if React never mounts (black-screen recovery) -->
      <div id="boot-fallback" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;text-align:center">
        <div style="font-size:1.2rem;font-weight:800;color:#fff">GrindUP</div>
        <div style="font-size:0.9rem;color:#888">Carregando...</div>
        <div id="boot-error" style="display:none;max-width:340px;padding:12px;background:#2a0e0e;border:1px solid #7a1e1e;border-radius:10px;font-size:0.75rem;color:#ff9090;word-break:break-word"></div>
        <button id="boot-reset" style="display:none;margin-top:20px;padding:12px 20px;background:#fff;color:#000;border:none;border-radius:10px;font-weight:800;font-size:0.9rem;cursor:pointer">
          🔄 Resetar app
        </button>
      </div>
    </div>
    <script>
      // Show fallback UI if React hasn't mounted after 4s
      setTimeout(function(){
        var fb = document.getElementById('boot-fallback');
        if (fb) {
          var btn = document.getElementById('boot-reset');
          if (btn) btn.style.display = 'inline-block';
        }
      }, 4000);
      // Capture any boot-time error
      window.addEventListener('error', function(e){
        var eb = document.getElementById('boot-error');
        var btn = document.getElementById('boot-reset');
        if (eb) { eb.style.display = 'block'; eb.textContent = (e.message || 'Erro') + ' @ ' + (e.filename || '').split('/').pop() + ':' + (e.lineno || '?'); }
        if (btn) btn.style.display = 'inline-block';
      });
      // Reset button handler (inline, runs even if main.jsx fails)
      document.getElementById('boot-reset').addEventListener('click', async function(){
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i=0;i<regs.length;i++) await regs[i].unregister();
          }
          if ('caches' in window) {
            var keys = await caches.keys();
            await Promise.all(keys.map(function(k){ return caches.delete(k); }));
          }
          var preserved = {};
          for (var j=0;j<localStorage.length;j++){
            var k = localStorage.key(j);
            if (k && k.indexOf('sb-') === 0) preserved[k] = localStorage.getItem(k);
          }
          localStorage.clear();
          for (var p in preserved) localStorage.setItem(p, preserved[p]);
        } catch(e){}
        window.location.href = '/?_r=' + Date.now();
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
